<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PowerDNS RPZ Monitor{% endblock %}</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
            --orange: #f97316;
            --purple: #a855f7;
            --border: #334155;
            --radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            height: 56px;
            gap: 8px;
        }
        .nav-brand {
            font-weight: 700;
            font-size: 18px;
            color: var(--accent);
            margin-right: 32px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-brand svg { width: 24px; height: 24px; }
        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav a:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .nav a.active { background: var(--accent); color: white; }
        .nav-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-user {
            font-size: 13px;
            color: var(--text-muted);
        }
        .nav-logout {
            color: var(--text-muted) !important;
            font-size: 13px !important;
            padding: 6px 12px !important;
        }
        .nav-logout:hover { color: var(--red) !important; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: var(--accent); }
        .card-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .card-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }
        .card-sub {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .card-value.green { color: var(--green); }
        .card-value.red { color: var(--red); }
        .card-value.yellow { color: var(--yellow); }
        .card-value.blue { color: var(--accent); }
        .card-value.purple { color: var(--purple); }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
        .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
        .badge-yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }

        .table-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 24px;
        }
        .table-title {
            padding: 16px 20px;
            font-weight: 600;
            font-size: 15px;
            border-bottom: 1px solid var(--border);
        }
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 10px 20px;
            text-align: left;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: rgba(0,0,0,0.2);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }
        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }
        .progress-fill.green { background: var(--green); }
        .progress-fill.yellow { background: var(--yellow); }
        .progress-fill.red { background: var(--red); }

        .chart-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 24px;
        }
        .chart-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 16px;
        }
        canvas { width: 100% !important; height: 200px !important; }

        .check-form {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .check-input {
            flex: 1;
            padding: 10px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }
        .check-input:focus { border-color: var(--accent); }
        .btn {
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: var(--accent-hover); }

        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }
        .result-card.blocked { border-color: var(--red); }
        .result-card.safe { border-color: var(--green); }
        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .result-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .result-icon.blocked { background: rgba(239,68,68,0.15); }
        .result-icon.safe { background: rgba(34,197,94,0.15); }
        pre.dig-output {
            background: var(--bg-primary);
            padding: 12px;
            border-radius: var(--radius);
            font-size: 13px;
            color: var(--text-secondary);
            overflow-x: auto;
            margin-top: 12px;
        }

        .section-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 768px) {
            .card-grid { grid-template-columns: repeat(2, 1fr); }
            .nav { padding: 0 12px; gap: 4px; }
            .nav-brand { margin-right: 12px; font-size: 15px; }
            .nav a { padding: 6px 10px; font-size: 13px; }
            .container { padding: 16px; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            PowerDNS RPZ Monitor
        </div>
        <a href="/" class="{{ 'active' if active_page == 'dashboard' else '' }}">Dashboard</a>
        <a href="/rpz" class="{{ 'active' if active_page == 'rpz' else '' }}">RPZ Zones</a>
        <a href="/check" class="{{ 'active' if active_page == 'check' else '' }}">Domain Check</a>
        <a href="/logs" class="{{ 'active' if active_page == 'logs' else '' }}">Query Log</a>
        <a href="/cdn" class="{{ 'active' if active_page == 'cdn' else '' }}">CDN Analytics</a>
        <a href="/resources" class="{{ 'active' if active_page == 'resources' else '' }}">Resource Monitor</a>
        <div class="nav-right">
            <span class="nav-user">👤 admin</span>
            <a href="/logout" class="nav-logout">Logout</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
        {% block scripts %}{% endblock %}
    </script>
</body>
</html>
